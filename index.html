<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damage Report - Laverton Cold Storage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header img {
            max-width: 100%;
            height: auto;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            margin-top: 0;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }

        .required::after {
            content: " *";
            color: #e74c3c;
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .camera-section {
            margin: 20px 0;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
            text-align: center;
        }

        #photoInput {
            display: none !important;
            position: absolute;
            left: -9999px;
        }

        .camera-button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        .camera-button:hover {
            background: #229954;
        }

        .camera-button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .photo-preview {
            margin-top: 15px;
            display: none;
        }

        .photo-preview img {
            max-width: 100%;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .remove-photo {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .remove-photo:hover {
            background: #c0392b;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .submit-btn {
            flex: 1;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
        }

        .cancel-btn {
            flex: 1;
            background: #95a5a6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .cancel-btn:hover {
            background: #7f8c8d;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .content {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="Chilled-LavertonCS-1.png" alt="Laverton Cold Storage" style="max-width: 280px; height: auto; margin-bottom: 20px;">
            <h1>Damage Report</h1>
            <p>Equipment Damage Incident Form</p>
        </div>

        <div class="content">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage">Report submitted successfully!</div>

            <form id="damageForm">
                <!-- Name -->
                <div class="form-group">
                    <label for="name" class="required">Report Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g., Reach Damage - 21 Apr" required>
                    <div class="info-text">Brief description of the damage incident</div>
                </div>

                <!-- Site -->
                <div class="form-group">
                    <label for="site" class="required">Site</label>
                    <select id="site" name="site" required>
                        <option value="">-- Select Site --</option>
                        <option value="Leakes Rd">Leakes Rd</option>
                        <option value="Foundation Rd">Foundation Rd</option>
                    </select>
                </div>

                <!-- Equipment Type -->
                <div class="form-group">
                    <label for="equipmentType" class="required">Equipment Type</label>
                    <select id="equipmentType" name="equipmentType" required>
                        <option value="">-- Select Equipment Type --</option>
                        <option value="Reach">Reach</option>
                        <option value="Forklift">Forklift</option>
                        <option value="Tugger">Tugger</option>
                        <option value="Electric Pallet Jack">Electric Pallet Jack</option>
                        <option value="Robot">Robot</option>
                        <option value="Airlock Doors">Airlock Doors</option>
                        <option value="Wrappers">Wrappers</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Equipment ID -->
                <div class="form-group">
                    <label for="equipmentId" class="required">Equipment ID</label>
                    <select id="equipmentId" name="equipmentId" required>
                        <option value="">-- Select Equipment Type First --</option>
                    </select>
                    <div class="info-text">Filtered based on Equipment Type selection</div>
                </div>

                <!-- Issue Description -->
                <div class="form-group">
                    <label for="issueDescription" class="required">Issue Description</label>
                    <textarea id="issueDescription" name="issueDescription" placeholder="Describe the damage, where it occurred, and any relevant details..." required></textarea>
                </div>

                <!-- Photo -->
                <div class="form-group">
                    <label for="photo">Photo</label>
                    <div class="camera-section">
                        <button type="button" class="camera-button" id="cameraButton">📷 Take Photo</button>
                        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
                        <div class="photo-preview" id="photoPreview">
                            <img id="photoImage" src="" alt="Photo preview">
                            <button type="button" class="remove-photo" id="removePhoto">Remove Photo</button>
                        </div>
                    </div>
                </div>

                <!-- Submission Date -->
                <div class="form-group">
                    <label for="submissionDate" class="required">Submission Date</label>
                    <input type="date" id="submissionDate" name="submissionDate" required>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="submit-btn">Submit Report</button>
                    <button type="button" class="cancel-btn" id="cancelBtn">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Equipment ID mapping
        const equipmentMap = {
            "Reach": ["RE01", "RE02", "RE03", "RE04", "RE05", "RE06", "RE07", "RE08"],
            "Forklift": ["FK01", "FK02", "FK03", "FK04"],
            "Tugger": ["TG01", "TG02", "TG03"],
            "Electric Pallet Jack": ["EPJ01", "EPJ02", "EPJ03"],
            "Robot": ["RB01"],
            "Airlock Doors": ["AD01", "AD02"],
            "Wrappers": ["WR01", "WR02"],
            "Other": ["OTHER"]
        };

        // Set today's date
        document.getElementById("submissionDate").valueAsDate = new Date();

        // Cascading dropdown for Equipment ID
        function updateEquipmentIdDropdown() {
            const equipmentType = document.getElementById("equipmentType").value;
            const equipmentIdSelect = document.getElementById("equipmentId");

            equipmentIdSelect.innerHTML = '<option value="">-- Select Equipment ID --</option>';

            if (equipmentType && equipmentMap[equipmentType]) {
                equipmentMap[equipmentType].forEach(id => {
                    const option = document.createElement("option");
                    option.value = id;
                    option.textContent = id;
                    equipmentIdSelect.appendChild(option);
                });
            }
        }

        // Use both 'change' and 'input' events for better iOS compatibility
        document.getElementById("equipmentType").addEventListener("change", updateEquipmentIdDropdown);
        document.getElementById("equipmentType").addEventListener("input", updateEquipmentIdDropdown);

        // Camera functionality
        const cameraButton = document.getElementById("cameraButton");
        const photoInput = document.getElementById("photoInput");
        const photoPreview = document.getElementById("photoPreview");
        const photoImage = document.getElementById("photoImage");
        const removePhotoBtn = document.getElementById("removePhoto");

        function triggerPhotoInput() {
            // Make sure the input is visible briefly on iOS
            photoInput.style.display = "block";
            photoInput.click();
            // Hide it again
            setTimeout(() => {
                photoInput.style.display = "none";
            }, 100);
        }

        cameraButton.addEventListener("click", function(e) {
            e.preventDefault();
            triggerPhotoInput();
        });

        // Also trigger on touch for better iOS support
        cameraButton.addEventListener("touchstart", function(e) {
            e.preventDefault();
            triggerPhotoInput();
        }, { passive: false });

        photoInput.addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoImage.src = event.target.result;
                    photoPreview.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        removePhotoBtn.addEventListener("click", function(e) {
            e.preventDefault();
            photoInput.value = "";
            photoPreview.style.display = "none";
            photoImage.src = "";
        });

        // Form submission
        document.getElementById("damageForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById("name").value,
                site: document.getElementById("site").value,
                equipmentType: document.getElementById("equipmentType").value,
                equipmentId: document.getElementById("equipmentId").value,
                issueDescription: document.getElementById("issueDescription").value,
                submissionDate: document.getElementById("submissionDate").value,
                photoData: photoImage.src || null
            };

            // Validate required fields
            if (!formData.name || !formData.site || !formData.equipmentType || !formData.equipmentId || !formData.issueDescription) {
                showError("Please fill in all required fields.");
                return;
            }

            // Log the data (in a real implementation, this would submit to SharePoint/API)
            console.log("Damage Report Submitted:", formData);

            // Show success message
            document.getElementById("successMessage").style.display = "block";

            // Store in localStorage as backup
            const reports = JSON.parse(localStorage.getItem("damageReports") || "[]");
            reports.push({
                ...formData,
                submittedAt: new Date().toISOString()
            });
            localStorage.setItem("damageReports", JSON.stringify(reports));

            // Clear form after 2 seconds
            setTimeout(() => {
                document.getElementById("damageForm").reset();
                document.getElementById("submissionDate").valueAsDate = new Date();
                photoPreview.style.display = "none";
                photoImage.src = "";
                document.getElementById("successMessage").style.display = "none";
            }, 2000);
        });

        // Cancel button
        document.getElementById("cancelBtn").addEventListener("click", function() {
            document.getElementById("damageForm").reset();
            document.getElementById("submissionDate").valueAsDate = new Date();
            photoPreview.style.display = "none";
            photoImage.src = "";
            document.getElementById("errorMessage").classList.remove("show");
            document.getElementById("successMessage").style.display = "none";
        });

        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.textContent = message;
            errorDiv.classList.add("show");
            setTimeout(() => {
                errorDiv.classList.remove("show");
            }, 5000);
        }
    </script>
</body>
</html>
