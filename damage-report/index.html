<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damage Report - Laverton Cold Storage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header img {
            max-width: 100%;
            height: auto;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            margin-top: 0;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .camera-section {
            margin: 20px 0;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
            text-align: center;
        }
        #photoInput, #photoUploadInput {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }
        .photo-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .camera-button, .upload-button {
            flex: 1 1 140px;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .camera-button {
            background: #27ae60;
        }
        .camera-button:hover {
            background: #229954;
        }
        .upload-button {
            background: #3b82f6;
        }
        .upload-button:hover {
            background: #1e40af;
        }
        .camera-button:disabled, .upload-button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .photo-preview {
            margin-top: 15px;
            display: none;
        }
        .photo-preview img {
            max-width: 100%;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .remove-photo {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .remove-photo:hover {
            background: #c0392b;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .submit-btn {
            flex: 1;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
        }
        .submit-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }
        .submit-btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }
        .submit-btn.submitted {
            background: #27ae60;
            font-size: 18px;
            padding: 20px;
            opacity: 1;
        }
        .cancel-btn {
            flex: 1;
            background: #95a5a6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .cancel-btn:hover {
            background: #7f8c8d;
        }
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .info-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #1e40af;
            text-decoration: none;
            margin-bottom: 18px;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .header {
                padding: 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .content {
                padding: 20px;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="Chilled-LavertonCS-1.png" alt="Laverton Cold Storage" style="max-width: 280px; height: auto; margin-bottom: 20px;">
            <h1>Damage Report</h1>
            <p>Equipment Damage Incident Form</p>
        </div>
        <div class="content">
            <a href="../" class="back-link">&larr; Back to all reports</a>
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage">Report submitted successfully!</div>
            <form id="damageForm">
                <!-- Submitted By -->
                <div class="form-group">
                    <label for="name" class="required">Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g., Matt Rowe" required>
                    <div class="info-text">Person submitting this report</div>
                </div>
                <!-- Site -->
                <div class="form-group">
                    <label for="site" class="required">Site</label>
                    <select id="site" name="site" required>
                        <option value="">-- Select Site --</option>
                        <option value="Leakes Rd">Leakes Rd</option>
                        <option value="Foundation Rd">Foundation Rd</option>
                    </select>
                </div>
                <!-- Equipment Type -->
                <div class="form-group">
                    <label for="equipmentType" class="required">Equipment Type</label>
                    <select id="equipmentType" name="equipmentType" required>
                        <option value="">-- Select Equipment Type --</option>
                        <option value="Reach">Reach</option>
                        <option value="Forklift">Forklift</option>
                        <option value="Tugger">Tugger</option>
                        <option value="Electric Pallet Jack">Electric Pallet Jack</option>
                        <option value="Robot">Robot</option>
                        <option value="Airlock Doors">Airlock Doors</option>
                        <option value="Wrappers">Wrappers</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <!-- Equipment ID -->
                <div class="form-group">
                    <label for="equipmentId" class="required">Equipment ID</label>
                    <select id="equipmentId" name="equipmentId" required>
                        <option value="">-- Select Equipment Type First --</option>
                    </select>
                    <div class="info-text">Filtered based on Equipment Type selection</div>
                </div>
                <!-- Issue Description -->
                <div class="form-group">
                    <label for="issueDescription" class="required">Issue Description</label>
                    <textarea id="issueDescription" name="issueDescription" placeholder="Describe the damage, where it occurred, and any relevant details..." required></textarea>
                </div>
                <!-- Photo -->
                <div class="form-group">
                    <label for="photoInput">Photo</label>
                    <div class="camera-section">
                        <div class="photo-buttons">
                            <button type="button" class="camera-button" id="cameraButton">&#128247; Take Photo</button>
                            <button type="button" class="upload-button" id="uploadButton">&#128193; Upload Photo</button>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" capture="environment">
                        <input type="file" id="photoUploadInput" accept="image/*">
                        <div class="photo-preview" id="photoPreview">
                            <img id="photoImage" src="" alt="Photo preview">
                            <button type="button" class="remove-photo" id="removePhoto">Remove Photo</button>
                        </div>
                    </div>
                </div>
                <!-- Submission Date -->
                <div class="form-group">
                    <label for="submissionDate" class="required">Submission Date</label>
                    <input type="date" id="submissionDate" name="submissionDate" required>
                </div>
                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="submit-btn">Submit Report</button>
                    <button type="button" class="cancel-btn" id="cancelBtn">Clear</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        // Equipment register is fetched from the SharePoint Equipment Register list
        // via the Cloudflare Worker on page load. This fallback map is used only if
        // the fetch fails (network issue, worker down, etc.) so users can still submit.
        const FALLBACK_EQUIPMENT_MAP = {
            "Leakes Rd": {
                "Reach": ["RMD1305", "RMD1306", "RMD1307", "RMD1308", "RMD1309", "RMD1310", "RMD1311", "RMD1312", "RMD1313", "RMD1314", "RMD1315", "RMD1331", "RMD1335", "RMD1336", "RMD1337"],
                "Forklift": ["SCP2340 (ss)", "SCP2341 (ss)", "SCP2342", "SCP2343", "SCP2344 (ss)", "SCP2345 (ss)", "SCP2348 (ss)", "SCP2349 (ss)", "SCP2350"],
                "Tugger": ["PR901S", "PR921S", "PR942", "PR943", "PR944", "PR945", "PR946", "PR947"],
                "Electric Pallet Jack": ["WP2594", "WP2650"],
                "Robot": [],
                "Airlock Doors": [],
                "Wrappers": [],
                "Other": ["OTHER"]
            },
            "Foundation Rd": {
                "Reach": ["RMD 113", "RMD 344", "RMD 345", "RMD 347", "RMD 349", "RMD 528", "RMD 647", "RMD 791", "RMD 792", "RMD 794", "RMD 797", "RMD1332", "RMD1333", "RMD1334", "RMD1338", "RMD1339"],
                "Forklift": ["SS - SCP1661", "SS - SCP1915", "SS - SCP1913", "SS - SCP1916", "SS - SCP1914", "SCP1854", "SCP1889", "SCP1980", "SCP1501", "SCP1891"],
                "Tugger": ["PR510", "PR606", "PR676", "PR678", "PR913S", "PR943"],
                "Electric Pallet Jack": ["WP1926", "WP2820", "WP2825"],
                "Robot": [],
                "Airlock Doors": [],
                "Wrappers": [],
                "Other": ["OTHER"]
            }
        };
        // Starts as fallback data; gets replaced with fresh data from SharePoint on load.
        let equipmentMap = FALLBACK_EQUIPMENT_MAP;
        // Fetch the live equipment register from the worker. If it fails for any
        // reason we just keep using the fallback map so the form is never broken.
        const WORKER_URL = "https://damage-report-api.matthew-rowe1982.workers.dev";
        fetch(WORKER_URL, { method: "GET" })
            .then(resp => {
                if (!resp.ok) throw new Error("Non-OK response: " + resp.status);
                return resp.json();
            })
            .then(liveMap => {
                // Merge so every Equipment Type keeps its key (empty list for no-ID types
                // like Airlock Doors) even if SharePoint has no rows for it.
                const merged = JSON.parse(JSON.stringify(FALLBACK_EQUIPMENT_MAP));
                for (const site of Object.keys(liveMap || {})) {
                    if (!merged[site]) merged[site] = {};
                    for (const type of Object.keys(liveMap[site] || {})) {
                        merged[site][type] = liveMap[site][type];
                    }
                }
                equipmentMap = merged;
                // If the user already selected site+type before fetch completed, refresh
                // the Equipment ID dropdown with the new data.
                if (typeof updateEquipmentIdDropdown === "function") {
                    updateEquipmentIdDropdown();
                }
            })
            .catch(err => {
                console.warn("Could not load live equipment register, using fallback:", err);
            });
        // Set today's date (LOCAL time, not UTC - avoids off-by-one-day bug overnight)
        function setSubmissionDateToToday() {
            document.getElementById("submissionDate").value = new Date().toLocaleDateString("en-CA");
        }
        setSubmissionDateToToday();
        // Refresh the date if the tab was left open overnight and user returns
        window.addEventListener("pageshow", setSubmissionDateToToday);
        // Cascading dropdown for Equipment ID (based on Site + Equipment Type)
        function updateEquipmentIdDropdown() {
            const site = document.getElementById("site").value;
            const equipmentType = document.getElementById("equipmentType").value;
            const equipmentIdSelect = document.getElementById("equipmentId");
            const equipmentIdInfo = equipmentIdSelect.parentElement.querySelector(".info-text");
            // Reset to default state
            equipmentIdSelect.innerHTML = '<option value="">-- Select Equipment ID --</option>';
            equipmentIdSelect.disabled = false;
            equipmentIdSelect.required = true;
            if (equipmentIdInfo) equipmentIdInfo.textContent = "Filtered based on Equipment Type selection";
            if (site && equipmentType && equipmentMap[site] && equipmentMap[site][equipmentType]) {
                const equipmentIds = equipmentMap[site][equipmentType];
                if (equipmentIds.length === 0) {
                    // Equipment type with no individual IDs (e.g. Airlock Doors, Wrappers)
                    // - auto-fill N/A and disable the field so user can submit
                    equipmentIdSelect.innerHTML = '<option value="N/A" selected>N/A - Not Applicable</option>';
                    equipmentIdSelect.disabled = true;
                    equipmentIdSelect.required = false;
                    if (equipmentIdInfo) equipmentIdInfo.textContent = "No individual ID needed for this equipment type";
                } else {
                    equipmentIds.forEach(id => {
                        if (id) { // Only add non-empty IDs
                            const option = document.createElement("option");
                            option.value = id;
                            option.textContent = id;
                            equipmentIdSelect.appendChild(option);
                        }
                    });
                }
            }
        }
        // Update Equipment ID when either Site or Equipment Type changes
        document.getElementById("site").addEventListener("change", updateEquipmentIdDropdown);
        document.getElementById("site").addEventListener("input", updateEquipmentIdDropdown);
        document.getElementById("equipmentType").addEventListener("change", updateEquipmentIdDropdown);
        document.getElementById("equipmentType").addEventListener("input", updateEquipmentIdDropdown);
        // Camera + upload functionality
        const cameraButton = document.getElementById("cameraButton");
        const uploadButton = document.getElementById("uploadButton");
        const photoInput = document.getElementById("photoInput");
        const photoUploadInput = document.getElementById("photoUploadInput");
        const photoPreview = document.getElementById("photoPreview");
        const photoImage = document.getElementById("photoImage");
        const removePhotoBtn = document.getElementById("removePhoto");
        // Shared handler for whichever input fires a "change"
        function handlePhotoSelected(e) {
            const file = e.target.files[0];
            if (!file) return;
            // Reject anything that isn't actually an image (iOS lets users pick ANY file,
            // regardless of the accept attribute)
            const isImage = file.type && file.type.startsWith("image/");
            const hasImageExtension = /\.(jpe?g|png|gif|heic|heif|webp|bmp)$/i.test(file.name || "");
            if (!isImage && !hasImageExtension) {
                showError("Only photo files are allowed (JPG, PNG, HEIC). Please choose an image.");
                e.target.value = "";
                return;
            }
            const reader = new FileReader();
            reader.onload = function(event) {
                photoImage.src = event.target.result;
                photoPreview.style.display = "block";
                // Clear any previous error once a valid photo lands
                const err = document.getElementById("errorMessage");
                if (err) { err.classList.remove("show"); err.style.display = "none"; }
            };
            reader.readAsDataURL(file);
        }
        // Upload button -> open file picker (no camera)
        uploadButton.addEventListener("click", function(e) {
            e.preventDefault();
            photoUploadInput.click();
        });
        photoUploadInput.addEventListener("change", handlePhotoSelected);
        // Simple click handler for camera button
        cameraButton.addEventListener("click", function(e) {
            e.preventDefault();
            photoInput.click();
        });
        photoInput.addEventListener("change", handlePhotoSelected);
        removePhotoBtn.addEventListener("click", function(e) {
            e.preventDefault();
            photoInput.value = "";
            photoUploadInput.value = "";
            photoPreview.style.display = "none";
            photoImage.src = "";
        });
        // Form submission
        document.getElementById("damageForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const submitBtn = document.querySelector(".submit-btn");
            const cancelBtn = document.getElementById("cancelBtn");

            // Guard against double-submit (button already locked)
            if (submitBtn.disabled) return;

            // Only send photo if user actually selected one (photoImage.src defaults
            // to the page URL when empty, so check for a proper data URI)
            const hasPhoto = photoImage.src && photoImage.src.startsWith("data:image");
            const formData = {
                name: document.getElementById("name").value,
                site: document.getElementById("site").value,
                equipmentType: document.getElementById("equipmentType").value,
                equipmentId: document.getElementById("equipmentId").value,
                issueDescription: document.getElementById("issueDescription").value,
                submissionDate: document.getElementById("submissionDate").value,
                photoData: hasPhoto ? photoImage.src : null
            };
            // Validate required fields
            if (!formData.name || !formData.site || !formData.equipmentType || !formData.equipmentId || !formData.issueDescription) {
                showError("Please fill in all required fields.");
                return;
            }

            // Lock the button immediately so it can't be tapped twice
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";

            // Submit to Cloudflare Worker
            const workerUrl = "https://damage-report-api.matthew-rowe1982.workers.dev";
            fetch(workerUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Server error: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                // Replace the Submit button with a clear "submitted" confirmation
                submitBtn.textContent = "\u2713 Report Submitted \u2014 Returning to menu...";
                submitBtn.classList.add("submitted");
                cancelBtn.style.display = "none";

                // Disable every input so nothing can be changed or re-fired
                document.querySelectorAll("#damageForm input, #damageForm select, #damageForm textarea, #damageForm button")
                    .forEach(el => { el.disabled = true; });

                // Return to Reports menu after a short pause
                setTimeout(() => {
                    window.location.href = "../";
                }, 1800);
            })
            .catch(error => {
                // Restore the button so the user can retry
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Report";

                showError("Error submitting report: " + error.message + ". Report saved locally (without photo) \u2014 please retry.");
                // Store metadata only (NOT the photo, which is huge) to avoid quota errors.
                // Capped to last 20 pending entries.
                try {
                    const { photoData, ...metadataOnly } = formData;
                    const reports = JSON.parse(localStorage.getItem("damageReports") || "[]");
                    reports.push({
                        ...metadataOnly,
                        submittedAt: new Date().toISOString(),
                        status: "pending"
                    });
                    // Keep only most recent 20 pending entries
                    const trimmed = reports.slice(-20);
                    localStorage.setItem("damageReports", JSON.stringify(trimmed));
                } catch (storageErr) {
                    // localStorage full or unavailable - not critical, ignore
                    console.warn("Could not save backup:", storageErr);
                }
            });
        });
        // Cancel button
        document.getElementById("cancelBtn").addEventListener("click", function() {
            document.getElementById("damageForm").reset();
            setSubmissionDateToToday();
            photoPreview.style.display = "none";
            photoImage.src = "";
            document.getElementById("errorMessage").classList.remove("show");
            document.getElementById("successMessage").style.display = "none";
        });
        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.textContent = message;
            errorDiv.classList.add("show");
            setTimeout(() => {
                errorDiv.classList.remove("show");
            }, 5000);
        }
    </script>
</body>
</html>
